<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>KIỂM TRA TOÀN BỘ CẤU HÌNH MÁY TÍNH SỬ DỤNG</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    margin-top:50px;
}

input{
    width:300px;
    padding:10px;
    margin:10px;
}

button{
    padding:12px 30px;
    font-size:16px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}
</style>

</head>

<body>

<h1>KIỂM TRA TOÀN BỘ CẤU HÌNH MÁY TÍNH SỬ DỤNG</h1>

<p>Nhập thông tin trước khi tải công cụ</p>

<input id="fullName" placeholder="Họ và tên">

<br>

<input id="department" placeholder="Phòng ban">

<br><br>

<button onclick="downloadPS1()">
Tải công cụ kiểm tra
</button>

<script>

async function downloadPS1(){

    let fullName =
        document.getElementById("fullName").value;

    let department =
        document.getElementById("department").value;

    if(!fullName || !department){
        alert("Vui lòng nhập đầy đủ thông tin");
        return;
    }

    let response =
        await fetch("inventory.ps1");

    let content =
        await response.text();

    content =
        content.replace(
            "__FULLNAME__",
            fullName
        );

    content =
        content.replace(
            "__DEPARTMENT__",
            department
        );

    let blob =
        new Blob(
            [content],
            {type:"text/plain"}
        );

    let a =
        document.createElement("a");

    a.href =
        URL.createObjectURL(blob);

    a.download =
        "inventory.ps1";

    a.click();
}

</script>

</body>
</html>
