<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>KIỂM TRA TOÀN BỘ CẤU HÌNH MÁY TÍNH SỬ DỤNG</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    margin-top:50px;
}

input{
    width:300px;
    padding:10px;
    margin:10px;
}

button{
    padding:12px 30px;
    font-size:16px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}
</style>

</head>

<body>

<h1>KIỂM TRA TOÀN BỘ CẤU HÌNH MÁY TÍNH SỬ DỤNG</h1>

<p>Nhập thông tin trước khi tải công cụ</p>

<input id="fullName" placeholder="Họ và tên">

<br>

<input id="department" placeholder="Phòng ban">

<br><br>

<button onclick="downloadTool()">
Tải công cụ kiểm tra
</button>

<script>

function downloadTool() {

    // ===== Tải inventory.ps1 =====

    let content = `
$fullName = "${fullName}"
$department = "${department}"

...toàn bộ code PowerShell...
`;

    let blob = new Blob(
        [content],
        {type:"text/plain"}
    );

    let ps1 = document.createElement("a");

    ps1.href = URL.createObjectURL(blob);

    ps1.download = "inventory.ps1";

    ps1.click();

    // ===== Tải run.bat =====

    setTimeout(() => {

        let bat = document.createElement("a");

        bat.href = "run.bat";

        bat.download = "run.bat";

        bat.click();

    }, 300);
}
    
</script>

</body>
</html>
