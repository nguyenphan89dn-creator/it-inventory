<!DOCTYPE html>

<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kiểm kê thiết bị CNTT</title>

<style>

body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin-top:50px;
}

.container{
    width:500px;
    margin:auto;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    font-size:16px;
}

button{
    padding:12px 24px;
    font-size:16px;
    cursor:pointer;
}

#step2{
    display:none;
    margin-top:30px;
}

.notice{
    margin-top:20px;
    color:#555;
}

</style>

</head>

<body>

<div class="container">

```
<h1>KIỂM KÊ THIẾT BỊ CNTT</h1>

<p>Nhập thông tin trước khi tải công cụ</p>

<input
    type="text"
    id="fullName"
    placeholder="Họ và tên">

<input
    type="text"
    id="department"
    placeholder="Phòng ban">

<button onclick="downloadTool()">
    Tải file cấu hình
</button>

<div id="step2">

    <h3>Đã tải file cấu hình</h3>

    <p>
        Tiếp tục tải file chạy bên dưới
    </p>

    <a href="run.bat" download>
        <button>
            Tải run.bat
        </button>
    </a>

    <div class="notice">

        <p>
            Sau khi tải xong:
        </p>

        <p>
            1. Đặt inventory.ps1 và run.bat cùng thư mục
        </p>

        <p>
            2. Double click run.bat
        </p>

        <p>
            3. Chờ thông báo hoàn thành
        </p>

    </div>

</div>
```

</div>

<script>

function downloadTool(){

    const fullName =
        document.getElementById("fullName").value.trim();

    const department =
        document.getElementById("department").value.trim();

    if(!fullName || !department){

        alert("Vui lòng nhập đầy đủ thông tin");

        return;
    }

    let content = `

$fullName = "${fullName}"

$department = "${department}"

`;

    const blob =
        new Blob(
            [content],
            {type:"text/plain"}
        );

    const a =
        document.createElement("a");

    a.href =
        URL.createObjectURL(blob);

    a.download =
        "inventory.ps1";

    a.click();

    document
        .getElementById("step2")
        .style.display = "block";
}

</script>

</body>

</html>
